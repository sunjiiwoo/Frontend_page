<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="NovaMart - A premium advanced product catalog with filtering, search, cart, and quick-view features.">
    <title>NovaMart | Advanced Product Catalog</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
</head>
<body>
    <nav class="navbar" id="navbar">
        <div class="nav-inner">
            <a href="#" class="logo" id="logo">
                <span class="logo-mark">◆</span>NovaMart
            </a>
            <div class="search-wrapper" id="search-wrapper">
                <span class="search-icon">🔍</span>
                <input type="text" class="search-input" id="search-input" placeholder="Search products..." autocomplete="off">
                <button class="search-clear hidden" id="search-clear" aria-label="Clear search">✕</button>
            </div>
            <div class="nav-actions">
                <button class="theme-toggle" id="theme-toggle" aria-label="Toggle theme">
                    <span class="theme-icon" id="theme-icon">🌙</span>
                </button>
                <button class="cart-toggle" id="cart-toggle" aria-label="Open cart">
                    <span class="cart-icon">🛒</span>
                    <span class="cart-badge hidden" id="cart-badge">0</span>
                </button>
            </div>
        </div>
    </nav>
    <section class="hero-banner" id="hero-banner">
        <div class="hero-bg-shapes">
            <div class="h-shape h-shape-1"></div>
            <div class="h-shape h-shape-2"></div>
        </div>
        <div class="hero-inner">
            <span class="hero-badge">🔥 New Collection 2026</span>
            <h1 class="hero-title">Discover Premium<br><span class="gradient-text">Products</span></h1>
            <p class="hero-sub">Curated tech, fashion & lifestyle essentials — all in one place.</p>
            <div class="hero-stats">
                <div class="h-stat"><strong>250+</strong><span>Products</span></div>
                <div class="h-stat"><strong>50+</strong><span>Brands</span></div>
                <div class="h-stat"><strong>4.9★</strong><span>Rating</span></div>
            </div>
        </div>
    </section>
    <main class="main-content">
        <div class="toolbar" id="toolbar">
            <div class="categories" id="categories">
                <button class="cat-btn active" data-category="all">All</button>
                <button class="cat-btn" data-category="electronics">🤍 Electronics</button>
                <button class="cat-btn" data-category="fashion"> 🤍Fashion</button>
                <button class="cat-btn" data-category="accessories">🤍 Accessories</button>
                <button class="cat-btn" data-category="home"> 🤍Home</button>
            </div>
            <div class="sort-wrapper">
                <label for="sort-select" class="sort-label">Sort by</label>
                <select class="sort-select" id="sort-select">
                    <option value="featured">Featured</option>
                    <option value="price-low">Price: Low → High</option>
                    <option value="price-high">Price: High → Low</option>
                    <option value="rating">Top Rated</option>
                    <option value="name">Name A-Z</option>
                </select>
            </div>
        </div>
        <div class="results-info" id="results-info">
            <span id="results-count">12 products</span>
            <span class="active-filter hidden" id="active-filter">
                <span id="filter-text"></span>
                <button class="clear-filter" id="clear-filter">✕</button>
            </span>
        </div>
                <div class="product-grid" id="product-grid">
        </div>
        <div class="empty-state hidden" id="empty-state">
            <span class="empty-icon">🤍</span>
            <h3>No products found</h3>
            <p>Try a different search or category.</p>
        </div>
    </main>
    <div class="modal-overlay hidden" id="modal-overlay">
        <div class="modal" id="modal">
            <button class="modal-close" id="modal-close" aria-label="Close modal">✕</button>
            <div class="modal-body">
                <div class="modal-image" id="modal-image"></div>
                <div class="modal-details">
                    <span class="modal-category" id="modal-category"></span>
                    <h2 class="modal-title" id="modal-title"></h2>
                    <div class="modal-rating" id="modal-rating"></div>
                    <p class="modal-desc" id="modal-desc"></p>
                    <div class="modal-tags" id="modal-tags"></div>
                    <div class="modal-price-row">
                        <span class="modal-price" id="modal-price"></span>
                        <span class="modal-old-price" id="modal-old-price"></span>
                    </div>
                    <div class="modal-quantity">
                        <button class="qty-btn" id="qty-minus">−</button>
                        <span class="qty-value" id="qty-value">1</span>
                        <button class="qty-btn" id="qty-plus">+</button>
                    </div>
                    <button class="modal-add-btn" id="modal-add-btn">
                        <span>Add to Cart</span>
                        <span class="btn-arrow">🤍🤍</span>
                    </button>
                </div>
            </div>
        </div>
    </div>
        <div class="cart-overlay hidden" id="cart-overlay"></div>
    <aside class="cart-sidebar" id="cart-sidebar">
        <div class="cart-header">
            <h2 class="cart-title">🛒 Your Cart</h2>
            <button class="cart-close" id="cart-close" aria-label="Close cart">✕</button>
        </div>
        <div class="cart-items" id="cart-items">
        </div>
        <div class="cart-empty hidden" id="cart-empty">
            <span class="empty-cart-icon">🛍️</span>
            <p>Your cart is empty</p>
        </div>
        <div class="cart-footer" id="cart-footer">
            <div class="cart-total-row">
                <span>Total</span>
                <span class="cart-total" id="cart-total">$0.00</span>
            </div>
            <button class="checkout-btn" id="checkout-btn">
                Checkout
                <span class="btn-arrow">→</span>
            </button>
        </div>
    </aside>
    <div class="toast-container" id="toast-container"></div>

    <script src="script.js"></script>
</body>
</html>
